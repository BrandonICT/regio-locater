<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eigenaar Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="height: auto; overflow-y: auto; padding: 2rem 1rem;">

  <div style="max-width: 800px; margin: 0 auto;">
    <a href="index.html" class="btn btn-secondary" style="margin-bottom: 1.5rem;">← Terug naar de kaart</a>
    
    <div class="card">
      <h1>Eigenaar Dashboard</h1>
      <p style="color: var(--text-muted); margin-top: 4px;">Beheer hier jouw eigen kastjes, foto's, status en meldingen.</p>
    </div>

    <div class="card">
      <h2>Nieuwe Locatie Toevoegen</h2>
      <form onsubmit="addKastje(event)">
        <label>Naam:</label>
        <input type="text" id="kastNaam" placeholder="Bijv. Buurtkastje Kerkstraat" required>

        <label>Type:</label>
        <select id="kastType">
          <option value="Buurtkastje">Buurtkastje</option>
          <option value="Minibieb">Minibieb</option>
        </select>

        <label>Adres + Woonplaats:</label>
        <input type="text" id="kastAdres" placeholder="Bijv. Kerkstraat 12, Amsterdam" required>

        <label>Foto URL (afbeeldingslink):</label>
        <input type="url" id="kastFoto" placeholder="https://voorbeeld.nl/foto.jpg">

        <label>Status Voorraad:</label>
        <select id="kastStatus">
          <option value="Goed gevuld">🟢 Goed gevuld</option>
          <option value="Bijna leeg">🟡 Bijna leeg</option>
          <option value="Dringend vulhulp nodig">🔴 Dringend vulhulp nodig!</option>
        </select>

        <label>Wenslijst (optioneel):</label>
        <textarea id="kastWenslijst" rows="3" placeholder="Bijv. Houdbare melk, rijst, kinderboeken..."></textarea>

        <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Plaats op de Kaart</button>
      </form>
    </div>

    <div class="card">
      <h2>Status & Wenslijst Bijwerken</h2>
      <label>Kies Jouw Kastje:</label>
      <select id="kastjeSelect" onchange="loadKastjeDetails()"></select>
      
      <label>Status Voorraad:</label>
      <select id="updateStatusInput">
        <option value="Goed gevuld">🟢 Goed gevuld</option>
        <option value="Bijna leeg">🟡 Bijna leeg</option>
        <option value="Dringend vulhulp nodig">🔴 Dringend vulhulp nodig!</option>
      </select>

      <label>Foto URL:</label>
      <input type="url" id="updateFotoInput" placeholder="https://voorbeeld.nl/foto.jpg">

      <label>Wenslijst tekst:</label>
      <textarea id="wenslijstInput" rows="3"></textarea>
      
      <button onclick="saveKastjeChanges()" class="btn">Wijzigingen Opslaan</button>
    </div>

    <h2 style="margin-bottom: 0.8rem; color: var(--primary);">Inkomende Meldingen voor Jouw Kastjes</h2>
    <div id="pending-list">Laden...</div>
  </div>

  <script>
    const db = supabase.createClient('https://izjbtmnivskyspmzknaw.supabase.co', 'sb_publishable_j0TN4PAFGlxdW88tju99Og_a6DpkbIX');
    let currentUserId = null;

    async function checkAdminAccess() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) return window.location.href = 'index.html';

      currentUserId = session.user.id;

      const { data: profile } = await db.from('profielen').select('rol').eq('id', currentUserId).single();
      if (!profile || profile.rol !== 'eigenaar') {
        alert('Dit scherm is alleen voor kastje-eigenaren.');
        window.location.href = 'index.html';
      } else {
        loadKastjesDropdown();
        loadPending();
      }
    }

    async function addKastje(e) {
      e.preventDefault();
      const naam = document.getElementById('kastNaam').value;
      const type = document.getElementById('kastType').value;
      const adres = document.getElementById('kastAdres').value;
      const foto_url = document.getElementById('kastFoto').value;
      const status = document.getElementById('kastStatus').value;
      const wenslijst = document.getElementById('kastWenslijst').value;

      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adres)}`);
      const geoData = await res.json();

      if (!geoData || geoData.length === 0) return alert('Adres niet gevonden! Controleer het adres.');

      const { error } = await db.from('kastjes').insert([{
        naam, type, adres, foto_url, status, wenslijst, 
        user_id: currentUserId,
        latitude: parseFloat(geoData[0].lat), 
        longitude: parseFloat(geoData[0].lon),
        updated_at: new Date().toISOString()
      }]);

      if (!error) {
        alert('Kastje succesvol toegevoegd aan jouw account!');
        location.reload();
      } else {
        alert('Fout bij opslaan: ' + error.message);
      }
    }

    // Alleen kastjes van de ingelogde eigenaar laden
    async function loadKastjesDropdown() {
      const { data } = await db.from('kastjes').select('*').eq('user_id', currentUserId);
      const select = document.getElementById('kastjeSelect');
      select.innerHTML = '';

      if (data && data.length > 0) {
        data.forEach(k => select.innerHTML += `<option value="${k.id}">${k.naam}</option>`);
        loadKastjeDetails();
      } else {
        select.innerHTML = '<option value="">Geen eigen kastjes gevonden</option>';
        document.getElementById('wenslijstInput').value = '';
        document.getElementById('updateFotoInput').value = '';
      }
    }

    async function loadKastjeDetails() {
      const id = document.getElementById('kastjeSelect').value;
      if (!id) return;
      const { data } = await db.from('kastjes').select('*').eq('id', id).single();
      if (data) {
        document.getElementById('wenslijstInput').value = data.wenslijst || '';
        document.getElementById('updateFotoInput').value = data.foto_url || '';
        document.getElementById('updateStatusInput').value = data.status || 'Goed gevuld';
      }
    }

    async function saveKastjeChanges() {
      const id = document.getElementById('kastjeSelect').value;
      if (!id) return alert('Selecteer eerst een kastje.');

      const wenslijst = document.getElementById('wenslijstInput').value;
      const foto_url = document.getElementById('updateFotoInput').value;
      const status = document.getElementById('updateStatusInput').value;

      await db.from('kastjes').update({ 
        wenslijst, foto_url, status, updated_at: new Date().toISOString() 
      }).eq('id', id).eq('user_id', currentUserId);

      alert('Kastje bijgewerkt!');
    }

    // Alleen meldingen van kastjes van déze eigenaar laden
    async function loadPending() {
      const { data } = await db.from('inventaris')
        .select('*, kastjes!inner(naam, user_id)')
        .eq('goedgekeurd', false)
        .eq('kastjes.user_id', currentUserId);

      const container = document.getElementById('pending-list');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="card"><p style="color: var(--text-muted);">Geen openstaande meldingen voor jouw kastjes.</p></div>';
        return;
      }

      container.innerHTML = data.map(item => `
        <div class="card">
          <p><b>Kastje:</b> ${item.kastjes?.naam || 'Onbekend'}</p>
          <p><b>Melding:</b> ${item.item}</p>
          <div style="margin-top: 10px; display: flex; gap: 8px;">
            <button class="btn" onclick="updateStatus(${item.id}, true)">Goedkeuren</button>
            <button class="btn btn-deny" onclick="deleteItem(${item.id})">Afwijzen</button>
          </div>
        </div>
      `).join('');
    }

    async function updateStatus(id, status) {
      await db.from('inventaris').update({ goedgekeurd: status }).eq('id', id);
      loadPending();
    }

    async function deleteItem(id) {
      await db.from('inventaris').delete().eq('id', id);
      loadPending();
    }

    checkAdminAccess();
  </script>
</body>
</html>
