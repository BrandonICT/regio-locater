<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eigenaar Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="height: auto; overflow-y: auto; padding: 2rem 1rem;">

  <div style="max-width: 800px; margin: 0 auto;">
    <a href="index.html" class="btn btn-secondary" style="margin-bottom: 1.5rem;">← Terug naar de kaart</a>
    
    <div class="card">
      <h1>Eigenaar Dashboard</h1>
      <p style="color: var(--text-muted); margin-top: 4px;">Beheer hier eenvoudig je eigen kastjes, wenslijsten en meldingen.</p>
    </div>

    <div class="card">
      <h2>Nieuwe Locatie Toevoegen</h2>
      <form onsubmit="addKastje(event)">
        <label>Naam:</label>
        <input type="text" id="kastNaam" placeholder="Bijv. Buurtkastje Kerkstraat" required>

        <label>Type:</label>
        <select id="kastType">
          <option value="Buurtkastje">Buurtkastje</option>
          <option value="Minibieb">Minibieb</option>
        </select>

        <label>Adres + Woonplaats:</label>
        <input type="text" id="kastAdres" placeholder="Bijv. Kerkstraat 12, Amsterdam" required>

        <label>Wenslijst (optioneel):</label>
        <textarea id="kastWenslijst" rows="3" placeholder="Bijv. Houdbare melk, rijst, kinderboeken..."></textarea>

        <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Plaats op de Kaart</button>
      </form>
    </div>

    <h2 style="margin-bottom: 0.8rem; color: var(--primary);">Inkomende Meldingen</h2>
    <div id="pending-list">Laden...</div>

    <div class="card" style="margin-top: 1.5rem;">
      <h2>Wenslijst Aanpassen</h2>
      <label>Kies Kastje:</label>
      <select id="kastjeSelect" onchange="loadWenslijst()"></select>
      
      <label>Wenslijst tekst:</label>
      <textarea id="wenslijstInput" rows="3"></textarea>
      <button onclick="saveWenslijst()" class="btn">Opslaan</button>
    </div>
  </div>

  <script>
    const db = supabase.createClient('https://izjbtmnivskyspmzknaw.supabase.co', 'sb_publishable_j0TN4PAFGlxdW88tju99Og_a6DpkbIX');

    async function checkAdminAccess() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) return window.location.href = 'index.html';

      const { data: profile } = await db.from('profielen').select('rol').eq('id', session.user.id).single();
      if (!profile || profile.rol !== 'eigenaar') {
        alert('Dit scherm is alleen voor kastje-eigenaren.');
        window.location.href = 'index.html';
      } else {
        loadPending();
        loadKastjesDropdown();
      }
    }

    async function addKastje(e) {
      e.preventDefault();
      const naam = document.getElementById('kastNaam').value;
      const type = document.getElementById('kastType').value;
      const adres = document.getElementById('kastAdres').value;
      const wenslijst = document.getElementById('kastWenslijst').value;

      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adres)}`);
      const geoData = await res.json();

      if (!geoData || geoData.length === 0) return alert('Adres niet gevonden! Controleer het adres.');

      const { error } = await db.from('kastjes').insert([{
        naam, type, adres, wenslijst, latitude: parseFloat(geoData[0].lat), longitude: parseFloat(geoData[0].lon)
      }]);

      if (!error) {
        alert('Kastje toegevoegd!');
        location.reload();
      }
    }

    async function loadPending() {
      const { data } = await db.from('inventaris').select('*, kastjes(naam)').eq('goedgekeurd', false);
      const container = document.getElementById('pending-list');
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="card"><p style="color: var(--text-muted);">Geen openstaande meldingen.</p></div>';
        return;
      }

      container.innerHTML = data.map(item => `
        <div class="card">
          <p><b>Kastje:</b> ${item.kastjes?.naam || 'Onbekend'}</p>
          <p><b>Melding:</b> ${item.item}</p>
          <div style="margin-top: 10px; display: flex; gap: 8px;">
            <button class="btn" onclick="updateStatus(${item.id}, true)">Goedkeuren</button>
            <button class="btn btn-deny" onclick="deleteItem(${item.id})">Afwijzen</button>
          </div>
        </div>
      `).join('');
    }

    async function updateStatus(id, status) {
      await db.from('inventaris').update({ goedgekeurd: status }).eq('id', id);
      loadPending();
    }

    async function deleteItem(id) {
      await db.from('inventaris').delete().eq('id', id);
      loadPending();
    }

    async function loadKastjesDropdown() {
      const { data } = await db.from('kastjes').select('*');
      const select = document.getElementById('kastjeSelect');
      select.innerHTML = '';
      if (data && data.length > 0) {
        data.forEach(k => select.innerHTML += `<option value="${k.id}">${k.naam}</option>`);
        loadWenslijst();
      }
    }

    async function loadWenslijst() {
      const id = document.getElementById('kastjeSelect').value;
      if (!id) return;
      const { data } = await db.from('kastjes').select('wenslijst').eq('id', id).single();
      if (data) document.getElementById('wenslijstInput').value = data.wenslijst || '';
    }

    async function saveWenslijst() {
      const id = document.getElementById('kastjeSelect').value;
      const wenslijst = document.getElementById('wenslijstInput').value;
      await db.from('kastjes').update({ wenslijst }).eq('id', id);
      alert('Wenslijst bijgewerkt!');
    }

    checkAdminAccess();
  </script>
</body>
</html>
