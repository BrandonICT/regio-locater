<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buurtkastjes & Minibiebs Regio</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="authModal" class="auth-overlay">
    <div class="auth-box">
      <h2 id="authTitle" style="color: var(--primary); margin-bottom: 0.5rem;">Registreren</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.2rem;">Maak een account aan om te starten.</p>
      
      <form id="authForm" onsubmit="handleAuth(event)">
        <label>E-mailadres</label>
        <input type="email" id="authEmail" required placeholder="naam@voorbeeld.nl">
        
        <label>Wachtwoord</label>
        <input type="password" id="authPassword" required minlength="6" placeholder="******">

        <div id="registerFields">
          <label>Woonplaats</label>
          <input type="text" id="authWoonplaats" placeholder="Bijv. Amsterdam">

          <label>Ik gebruik het platform als:</label>
          <select id="authRol">
            <option value="bezoeker">Bezoeker (Zoeken & Meldingen)</option>
            <option value="eigenaar">Eigenaar (Kastje beheren)</option>
          </select>
        </div>

        <button type="submit" class="btn" id="authSubmitBtn" style="width: 100%; margin-top: 10px;">Account Aanmaken</button>
      </form>
      <br>
      <p style="font-size:0.9rem; text-align:center;">
        <span id="authToggleText">Al een account?</span> 
        <a href="#" onclick="toggleAuthMode()" id="authToggleLink" style="color: var(--primary); font-weight: bold;">Inloggen</a>
      </p>
    </div>
  </div>

  <div id="drawerOverlay" class="drawer-overlay" onclick="toggleDrawer()"></div>
  <div id="drawer" class="drawer">
    <h2>Menu & Opties</h2>
    <div class="drawer-nav">
      <div id="drawerUserInfo" style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;"></div>
      <div id="drawerMenuButtons"></div>
    </div>
    <button onclick="logout()" class="btn btn-logout" style="width: 100%; margin-top: auto;">Uitloggen</button>
  </div>

  <header>
    <h1>Buurtkastjes Regio</h1>
    <button class="menu-toggle-btn" onclick="toggleDrawer()">☰ Menu</button>
  </header>

  <div class="search-container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Zoek op plaats of adres..." style="margin:0;">
      <button onclick="searchLocation()" class="btn">Zoeken</button>
      <button onclick="locateUser()" class="btn btn-gps">GPS</button>
    </div>
    
    <div class="filter-group">
      <button onclick="filterKastjes('alles')" class="btn btn-secondary active" id="filter-alles">Alles</button>
      <button onclick="filterKastjes('Buurtkastje')" class="btn btn-secondary" id="filter-kastjes">Kastjes</button>
      <button onclick="filterKastjes('Minibieb')" class="btn btn-secondary" id="filter-biebs">Biebs</button>
    </div>
  </div>

  <div id="container">
    <div id="map"></div>
    <div id="sidebar">
      <div class="card">
        <h2>Selecteer een locatie</h2>
        <p style="color: var(--text-muted); margin-top: 6px;">Klik op een gekleurde speld op de kaart om details, wenslijst en opties te bekijken.</p>
      </div>
    </div>
  </div>

  <script>
    const db = supabase.createClient('https://izjbtmnivskyspmzknaw.supabase.co', 'sb_publishable_j0TN4PAFGlxdW88tju99Og_a6DpkbIX');
    let map, isLoginMode = false, currentUser = null, userProfile = null;
    let allKastjes = [], markersGroup = L.layerGroup(), userMarker = null, userCoords = null;

    const greenIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const blueIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    map = L.map('map').setView([52.3676, 4.9041], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    markersGroup.addTo(map);

    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('active');
      document.getElementById('drawerOverlay').classList.toggle('active');
    }

    async function checkUser() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        currentUser = session.user;
        const { data } = await db.from('profielen').select('*').eq('id', currentUser.id).single();
        userProfile = data;
        document.getElementById('authModal').style.display = 'none';
        updateDrawerNav();
        loadKastjes();
      } else {
        document.getElementById('authModal').style.display = 'flex';
      }
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('authTitle').innerText = isLoginMode ? 'Inloggen' : 'Registreren';
      document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'Inloggen' : 'Account Aanmaken';
      document.getElementById('authToggleText').innerText = isLoginMode ? 'Nog geen account?' : 'Al een account?';
      document.getElementById('authToggleLink').innerText = isLoginMode ? 'Registreren' : 'Inloggen';
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;

      if (isLoginMode) {
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else checkUser();
      } else {
        const rol = document.getElementById('authRol').value;
        const woonplaats = document.getElementById('authWoonplaats').value;
        const { data, error } = await db.auth.signUp({ email, password });
        if (error) alert(error.message);
        else if (data.user) {
          await db.from('profielen').insert([{ id: data.user.id, email, rol, woonplaats }]);
          alert('Account aangemaakt!');
          checkUser();
        }
      }
    }

    function updateDrawerNav() {
      document.getElementById('drawerUserInfo').innerHTML = `Ingelogd als:<br><b>${currentUser.email}</b> (${userProfile?.rol || 'bezoeker'})`;
      let html = `<button onclick="window.location.href='index.html'" class="btn btn-secondary" style="width:100%; text-align:left;">📍 Kaart Bekijken</button>`;
      
      if (userProfile?.rol === 'eigenaar') {
        html += `<button onclick="window.location.href='admin.html'" class="btn" style="width:100%; margin-top:8px;">⚙️ Admin Dashboard</button>`;
      }
      document.getElementById('drawerMenuButtons').innerHTML = html;
    }

    async function logout() {
      await db.auth.signOut();
      location.reload();
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      const d = R * c;
      return d < 1 ? Math.round(d * 1000) + ' meter' : d.toFixed(1) + ' km';
    }

    function locateUser() {
      if (!navigator.geolocation) return alert('Geolocatie niet ondersteund.');
      navigator.geolocation.getCurrentPosition((pos) => {
        userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        map.setView([userCoords.lat, userCoords.lon], 14);
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([userCoords.lat, userCoords.lon], { color: '#0288d1', fillColor: '#29b6f6', fillOpacity: 0.8, radius: 9 }).addTo(map);
      });
    }

    async function searchLocation() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
      const data = await res.json();
      if (data && data.length > 0) map.setView([data[0].lat, data[0].lon], 14);
    }

    async function loadKastjes() {
      const { data } = await db.from('kastjes').select('*');
      if (data) {
        allKastjes = data;
        renderMarkers('alles');
      }
    }

    function renderMarkers(filter) {
      markersGroup.clearLayers();
      allKastjes.forEach(k => {
        if (filter === 'alles' || k.type === filter) {
          const icon = k.type === 'Minibieb' ? blueIcon : greenIcon;
          const marker = L.marker([k.latitude, k.longitude], { icon }).addTo(markersGroup);
          marker.bindPopup(`<b>${k.naam}</b><br>${k.adres}`);
          marker.on('click', () => showDetails(k));
        }
      });
    }

    function filterKastjes(type) {
      document.querySelectorAll('.filter-group .btn').forEach(btn => btn.classList.remove('active'));
      if (type === 'alles') document.getElementById('filter-alles').classList.add('active');
      if (type === 'Buurtkastje') document.getElementById('filter-kastjes').classList.add('active');
      if (type === 'Minibieb') document.getElementById('filter-biebs').classList.add('active');
      renderMarkers(type);
    }

    async function showDetails(k) {
      const badgeClass = k.type === 'Minibieb' ? 'badge-bieb' : 'badge-kastje';
      const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${k.latitude},${k.longitude}`;
      
      let statusColor = '#2e7d32';
      if (k.status === 'Bijna leeg') statusColor = '#f57c00';
      if (k.status === 'Dringend vulhulp nodig') statusColor = '#d32f2f';

      const lastUpdate = k.updated_at 
        ? new Date(k.updated_at).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' })
        : 'Onbekend';

      let distanceText = '';
      if (userCoords) {
        const dist = calculateDistance(userCoords.lat, userCoords.lon, k.latitude, k.longitude);
        distanceText = `<p style="font-size: 0.9rem; color: var(--secondary); font-weight: bold; margin-top: 4px;"> Afstand vanaf jou: ${dist}</p>`;
      }

      const { data: approvedItems } = await db.from('inventaris').select('item').eq('kastje_id', k.id).eq('goedgekeurd', true);

      let itemsListHtml = '<p style="font-size: 0.85rem; color: #888;">Nog geen goedgekeurde meldingen van bezoekers.</p>';
      if (approvedItems && approvedItems.length > 0) {
        itemsListHtml = '<ul style="margin-left: 20px; font-size: 0.9rem; color: var(--text-main);">' + 
          approvedItems.map(i => `<li style="margin-bottom: 3px;">${i.item}</li>`).join('') + '</ul>';
      }

      document.getElementById('sidebar').innerHTML = `
        <div class="card">
          ${k.foto_url ? `<img src="${k.foto_url}" alt="${k.naam}" style="width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:12px;">` : ''}
          <span class="badge ${badgeClass}">${k.type || 'Buurtkastje'}</span>
          <span class="badge" style="background-color: ${statusColor};">${k.status || 'Goed gevuld'}</span>
          
          <h2>${k.naam}</h2>
          <p style="color: var(--text-muted); margin-top: 4px;"><b>Adres:</b> ${k.adres}</p>
          ${distanceText}
          <p style="font-size: 0.8rem; color: #888; margin-top: 4px;">Laatst bijgewerkt: ${lastUpdate}</p>
          
          <a href="${googleMapsUrl}" target="_blank" class="btn btn-route">Route via Google Maps</a>
        </div>
        
        <div class="card">
          <h3>Wenslijst Eigenaar</h3>
          <p style="margin-top: 6px; color: var(--text-main);">${k.wenslijst || 'Geen wenslijst opgegeven.'}</p>
        </div>

        <div class="card">
          <h3>Actuele Voorraad (Door bezoekers)</h3>
          <div style="margin-top: 8px;">${itemsListHtml}</div>
          
          <hr style="margin: 12px 0; border: none; border-top: 1px solid var(--border-color);">
          
          <h4 style="font-size: 0.95rem; margin-bottom: 6px; color: var(--primary);">Meld wat je gebracht of gezien hebt:</h4>
          <input type="text" id="visitorItemInput" placeholder="Bijv. 2 pakken pasta neergezet" style="margin-bottom: 8px;">
          <button onclick="submitVisitorItem(${k.id})" class="btn" style="width: 100%;">Melding Insturen</button>
        </div>
      `;
    }

    async function submitVisitorItem(kastjeId) {
      const itemText = document.getElementById('visitorItemInput').value.trim();
      if (!itemText) return alert('Vul eerst een melding in.');

      const { error } = await db.from('inventaris').insert([{
        kastje_id: kastjeId,
        item: itemText,
        goedgekeurd: false
      }]);

      if (!error) {
        alert('Melding verstuurd naar de eigenaar ter goedkeuring!');
        document.getElementById('visitorItemInput').value = '';
      } else {
        alert('Fout bij versturen: ' + error.message);
      }
    }

    checkUser();
  </script>
</body>
</html>
